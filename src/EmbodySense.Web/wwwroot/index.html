<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EmbodySense</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div>
          <h1>EmbodySense</h1>
          <p id="workspaceRoot">Workspace loading</p>
        </div>
      </div>
      <div class="status-strip">
        <span id="clientStatus">Web primary</span>
        <span id="workspaceStatus">Checking workspace</span>
      </div>
    </header>

    <main class="workspace">
      <section class="session-panel" aria-label="Session">
        <div id="transcript" class="transcript" aria-live="polite"></div>
        <form id="messageForm" class="composer">
          <textarea id="messageInput" name="message" rows="3" placeholder="Send a message to the agent"></textarea>
          <div class="composer-actions">
            <button id="sendButton" type="submit">Send</button>
            <button id="cancelButton" type="button">Cancel</button>
          </div>
        </form>
      </section>

      <aside class="side-panel" aria-label="Control panel">
        <section class="panel-section">
          <div class="section-title">
            <h2>Workspace</h2>
            <button id="initButton" type="button">Initialize</button>
          </div>
          <dl class="meta-list">
            <div>
              <dt>Client</dt>
              <dd id="clientRole">Web</dd>
            </div>
            <div>
              <dt>CLI</dt>
              <dd id="cliRole">Verification</dd>
            </div>
          </dl>
        </section>

        <section class="panel-section configuration-section" aria-label="Configuration">
          <div class="section-title">
            <h2>Configuration</h2>
            <button id="refreshConfigButton" type="button">Refresh</button>
          </div>
          <div class="config-tabs" role="tablist" aria-label="Configuration sections">
            <button type="button" role="tab" aria-selected="true" data-config-tab="overview">Overview</button>
            <button type="button" role="tab" aria-selected="false" data-config-tab="permissions">Permissions</button>
            <button type="button" role="tab" aria-selected="false" data-config-tab="agent">Agent</button>
            <button type="button" role="tab" aria-selected="false" data-config-tab="audit">Audit</button>
            <button type="button" role="tab" aria-selected="false" data-config-tab="history">History</button>
          </div>
          <div id="configContent" class="config-content" aria-live="polite"></div>
        </section>

        <section class="panel-section approvals-section">
          <div class="section-title">
            <h2>Approvals</h2>
            <span id="approvalCount">0 pending</span>
          </div>
          <div id="approvals" class="approvals"></div>
        </section>
      </aside>
    </main>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
